# CircleCI Configuration File

version: 2.1

orbs:
  node: circleci/node@7.2.1

jobs:
  build-app:
     docker:
        - image: cimg/node:24.13.0
     resource_class: small
     steps:
        - checkout
        - node/install-packages
        - run:
             name: Build The Application
             command: npm run build
  deploy-app:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - run:
           name: Call Deploy Webhook
           command: echo "A webhook to be called"
  secret-job:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - run:
          name: Print Secret From Context
          command: echo $PRACTICE_VARIABLE

workflows:
  build_and_deploy:
    jobs:
      - build-app
      - secret-job:
          context:
            - Practice Context
      - deploy-app:
          requires:
            - build-app
